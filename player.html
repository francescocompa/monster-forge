<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#121317">
<title>Initiative</title>
<!-- Standalone read-only player view for Monster Forge's combat tracker (B202). Polls a PUBLIC JSONBin
     bin (id in ?b=) that the DM's app publishes the live initiative to. Fully self-contained: it does NOT
     load the app scripts. PCs are shown in full; monsters are obscured (faction label + health band). -->
<style>
  :root{
    --bg:#121317; --panel:#1b1d22; --panel-2:#23262d; --line:#30343d; --ink:#e7e9ee; --dim:#a4aab4;
    --accent:#e2654d; --cur:#e2654d; --ok:#5fa873; --warn:#d7a93f; --bad:#d2604a; --pc:#5b9bd5;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0}
  body{background:var(--bg);color:var(--ink);font:16px/1.4 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) calc(env(safe-area-inset-bottom) + 24px) env(safe-area-inset-left);
    min-height:100vh;-webkit-font-smoothing:antialiased}
  .wrap{max-width:560px;margin:0 auto;padding:16px 14px 0}
  header{display:flex;align-items:baseline;justify-content:space-between;gap:10px;padding:6px 4px 14px;position:sticky;top:0;
    background:linear-gradient(var(--bg) 70%,transparent);z-index:5}
  .ttl{font-weight:700;font-size:1.1rem;letter-spacing:.02em}
  .round{font-size:.95rem;color:var(--accent);font-weight:700;white-space:nowrap}
  .status{font-size:.8rem;color:var(--dim);padding:0 4px 12px}
  ol{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:8px}
  li{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:11px 13px;
    display:flex;align-items:center;gap:11px;position:relative;transition:transform .15s ease,border-color .15s ease}
  li.cur{border-color:var(--cur);background:linear-gradient(90deg,rgba(226,101,77,.16),var(--panel) 60%);
    box-shadow:0 0 0 1px var(--cur) inset}
  li.dim{opacity:.5}
  .turn-dot{width:8px;height:8px;border-radius:50%;background:transparent;flex:0 0 8px}
  li.cur .turn-dot{background:var(--cur);box-shadow:0 0 8px var(--cur)}
  .body{flex:1;min-width:0}
  .name-row{display:flex;align-items:center;gap:8px}
  .name{font-weight:600;font-size:1.02rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  li.pc .name{color:var(--pc)}
  .tag{font-size:.66rem;text-transform:uppercase;letter-spacing:.06em;color:var(--dim);border:1px solid var(--line);
    border-radius:999px;padding:1px 7px;flex:0 0 auto}
  .cur-badge{font-size:.66rem;text-transform:uppercase;letter-spacing:.06em;color:#fff;background:var(--cur);
    border-radius:999px;padding:1px 8px;font-weight:700;margin-left:auto;flex:0 0 auto}
  .conds{display:flex;flex-wrap:wrap;gap:5px;margin-top:7px}
  .cond{font-size:.72rem;color:var(--ink);background:var(--panel-2);border:1px solid var(--line);border-radius:6px;padding:1px 7px}
  .hp{margin-top:8px}
  .hpbar{height:7px;border-radius:4px;background:var(--panel-2);overflow:hidden;border:1px solid var(--line)}
  .hpbar i{display:block;height:100%}
  .hp-num{font-size:.78rem;color:var(--dim);margin-top:3px}
  .hp-num b{color:var(--ink)}
  .band{margin-top:8px;display:flex;align-items:center;gap:7px;font-size:.82rem;color:var(--dim)}
  .band .pip{width:9px;height:9px;border-radius:50%}
  li.down{opacity:.62}
  li.down .name{text-decoration:line-through;text-decoration-thickness:1px}
  .dead-tag{color:var(--bad);font-weight:700}
  .empty,.err{text-align:center;color:var(--dim);padding:64px 20px;line-height:1.6}
  .err b{color:var(--ink);display:block;margin-bottom:6px;font-size:1.05rem}
  .pulse{animation:pulse 1s ease}
  @keyframes pulse{0%{background-color:rgba(226,101,77,.2)}100%{background-color:transparent}}
  footer{text-align:center;color:var(--dim);font-size:.72rem;padding:22px 0 6px;opacity:.7}
  /* Editing (B203) */
  .mode-pill{font-size:.62rem;text-transform:uppercase;letter-spacing:.06em;font-weight:700;color:var(--accent);
    border:1px solid var(--accent);border-radius:999px;padding:2px 8px;margin-left:auto}
  .claimbar{display:flex;gap:8px;align-items:center;background:var(--panel);border:1px solid var(--accent);
    border-radius:12px;padding:11px 13px;margin-bottom:10px}
  .claimbar.set{border-color:var(--line)}
  .claimbar input{flex:1;min-width:0;background:var(--panel-2);border:1px solid var(--line);border-radius:8px;
    color:var(--ink);font-size:.95rem;padding:9px 11px}
  .claimbar button{background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:.85rem;
    font-weight:600;padding:9px 14px;flex:0 0 auto}
  .claimbar .who{flex:1;font-size:.9rem}.claimbar .who b{color:var(--pc)}
  .claimbar .link{background:none;color:var(--dim);font-weight:500;padding:6px 4px}
  li.editable{cursor:default}
  .ed{margin-top:10px;display:flex;flex-direction:column;gap:9px}
  .ed-hp{display:flex;align-items:center;gap:8px}
  .ed-step{width:38px;height:38px;flex:0 0 auto;border-radius:9px;border:1px solid var(--line);background:var(--panel-2);
    color:var(--ink);font-size:1.3rem;line-height:1;display:flex;align-items:center;justify-content:center}
  .ed-step:active{background:var(--accent);border-color:var(--accent)}
  .ed-hpin{width:64px;text-align:center;background:var(--panel-2);border:1px solid var(--line);border-radius:9px;
    color:var(--ink);font-size:1.05rem;font-weight:700;padding:8px 4px}
  .ed-max{color:var(--dim);font-size:.9rem}
  .ed-send{margin-left:auto;background:var(--accent);color:#fff;border:none;border-radius:9px;font-size:.85rem;
    font-weight:600;padding:9px 14px}.ed-send:disabled{opacity:.5}
  .ed-conds{display:flex;flex-wrap:wrap;gap:6px;align-items:center}
  .ed-cond{font-size:.74rem;background:var(--panel-2);border:1px solid var(--line);border-radius:7px;padding:3px 4px 3px 9px;
    display:inline-flex;align-items:center;gap:5px;color:var(--ink)}
  .ed-cond button{background:none;border:none;color:var(--dim);font-size:1rem;line-height:1;padding:0 2px}
  .ed-addc{font-size:.74rem;background:none;border:1px dashed var(--line);border-radius:7px;padding:4px 10px;color:var(--dim)}
  .cmenu{display:flex;flex-wrap:wrap;gap:6px;padding:9px;background:var(--panel-2);border:1px solid var(--line);border-radius:9px}
  .cmenu button{font-size:.74rem;background:var(--panel);border:1px solid var(--line);border-radius:7px;padding:4px 9px;color:var(--ink)}
  .cmenu button.on{background:var(--accent);border-color:var(--accent);color:#fff}
  .ed-flash{font-size:.74rem;color:var(--ok);font-weight:600;align-self:center}
</style>
</head>
<body>
<div class="wrap">
  <header><span class="ttl">Initiative</span><span class="round" id="round"></span></header>
  <div class="status" id="status">Connecting…</div>
  <div id="editbar"></div>
  <ol id="list"></ol>
  <footer>Monster Forge · live initiative</footer>
</div>
<script>
(function(){
  "use strict";
  var BASE="https://api.jsonbin.io/v3";
  var params=new URLSearchParams(location.search);
  var binId=params.get("b");
  var listEl=document.getElementById("list");
  var roundEl=document.getElementById("round");
  var statusEl=document.getElementById("status");
  var editbarEl=document.getElementById("editbar");
  var prevCurName=null, failCount=0;
  // Editing state (B203): mode/wbin/wkey come from the snapshot; claimId/pname are the player's own.
  var snap=null, mode="off", wbin=null, wkey=null, claimId=null, pname="";
  var pending={};   // pcId → {hp,conds,ts} — live: optimistic override; suggest: unsent draft
  var flashes={};   // pcId → transient confirmation text
  var writeTimers={}, condMenuFor=null;
  var CONDITIONS=["Blinded","Charmed","Deafened","Frightened","Grappled","Incapacitated","Invisible",
    "Paralyzed","Petrified","Poisoned","Prone","Restrained","Stunned","Unconscious","Exhaustion","Concentrating"];

  var BAND={healthy:{c:"var(--ok)",t:"Healthy"},hurt:{c:"var(--warn)",t:"Hurt"},
    bloodied:{c:"var(--bad)",t:"Bloodied"},critical:{c:"var(--bad)",t:"Critical"},down:{c:"var(--dim)",t:"Down"}};

  function esc(s){return String(s==null?"":s).replace(/[&<>"]/g,function(c){
    return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];});}
  function showMsg(html,cls){listEl.innerHTML="";statusEl.style.display="none";roundEl.textContent="";editbarEl.innerHTML="";
    var d=document.createElement("div");d.className=cls||"empty";d.innerHTML=html;listEl.appendChild(d);}

  function rowById(id){if(!snap)return null;for(var i=0;i<snap.order.length;i++)if(snap.order[i].id===id)return snap.order[i];return null;}
  function canEdit(row){return !!(row.pc&&row.id&&mode&&mode!=="off"&&wkey&&wbin&&(mode!=="own"||row.id===claimId));}
  function effHp(row){var p=pending[row.id];if(p&&p.hp!=null)return p.hp;return row.hp?row.hp.c:null;}
  function effConds(row){var p=pending[row.id];if(p&&p.conds!=null)return p.conds.slice();return (row.c||[]).slice();}
  function condsEq(a,b){return a.slice().sort().join("|")===b.slice().sort().join("|");}

  // Drop optimistic overrides once the DM's snapshot has caught up (or after a 15s safety timeout). Suggest
  // drafts are left until the player sends/clears them.
  function reconcilePending(){if(mode==="suggest")return;var now=Date.now();
    Object.keys(pending).forEach(function(id){var p=pending[id],row=rowById(id);
      if(!row){delete pending[id];return;}
      if(p.hp!=null&&row.hp&&row.hp.c===p.hp)delete p.hp;
      if(p.conds!=null&&condsEq(row.c||[],p.conds))delete p.conds;
      if((p.hp==null&&p.conds==null)||(now-(p.ts||0)>15000))delete pending[id];});}

  function flashRow(id,text){flashes[id]=text;render();setTimeout(function(){if(flashes[id]===text){delete flashes[id];render();}},1800);}

  function editbarHTML(){
    if(mode==="off"||!wkey||!wbin)return "";
    if(mode==="own"){
      if(!claimId){return '<div class="claimbar"><input id="claimInput" placeholder="Your character’s name" autocomplete="off">'+
        '<button data-act="join">Join</button><div class="claim-err" style="flex-basis:100%;font-size:.75rem;color:var(--bad)"></div></div>';}
      var r=rowById(claimId);
      return '<div class="claimbar set"><span class="who">Playing <b>'+esc(r?r.n:pname||"your character")+'</b></span>'+
        '<button class="link" data-act="unclaim">change</button></div>';
    }
    if(mode==="all")return '<div class="claimbar set"><span class="mode-pill" style="margin:0 0 0">Live</span><span class="who" style="flex:1">Tap a character to update its HP or conditions.</span></div>';
    return '<div class="claimbar set"><span class="mode-pill" style="margin:0">Suggest</span><span class="who" style="flex:1">Your changes are sent to the DM to approve.</span></div>';
  }

  function rowHTML(row){
    var cls=["",row.pc?"pc":"mon"],ed=canEdit(row);
    if(row.cur)cls.push("cur");
    if(row.down)cls.push("down");
    if(ed)cls.push("editable");
    var inner='<span class="turn-dot"></span><div class="body">';
    inner+='<div class="name-row"><span class="name">'+esc(row.n)+'</span>';
    if(!row.pc)inner+='<span class="tag">'+(row.dead?'<span class="dead-tag">Dead</span>':"Foe")+'</span>';
    else if(row.dead)inner+='<span class="tag"><span class="dead-tag">Dead</span></span>';
    if(row.cur)inner+='<span class="cur-badge">Turn</span>';
    inner+='</div>';
    if(row.hp){
      var hc=effHp(row),ratio=row.hp.m?hc/row.hp.m:0;
      var col=ratio>.5?"var(--ok)":ratio>.25?"var(--warn)":"var(--bad)";
      var pct=Math.max(0,Math.min(100,row.hp.m?hc/row.hp.m*100:0));
      inner+='<div class="hp"><div class="hpbar"><i style="width:'+pct+'%;background:'+col+'"></i></div>'+
        '<div class="hp-num"><b>'+hc+'</b> / '+row.hp.m+(row.hp.t?' <span style="color:var(--pc)">+'+row.hp.t+' temp</span>':"")+'</div></div>';
    }else if(row.band){var b=BAND[row.band]||BAND.hurt;
      inner+='<div class="band"><span class="pip" style="background:'+b.c+'"></span>'+b.t+'</div>';}
    if(!ed&&row.c&&row.c.length)
      inner+='<div class="conds">'+row.c.map(function(c){return '<span class="cond">'+esc(c)+'</span>';}).join("")+'</div>';
    if(ed)inner+=editControlsHTML(row);
    inner+='</div>';
    return '<li class="'+cls.join(" ").trim()+'">'+inner+'</li>';
  }

  function editControlsHTML(row){
    var ec=effConds(row),id=row.id,out='<div class="ed">';
    if(row.hp){out+='<div class="ed-hp">'+
      '<button class="ed-step" data-act="hpd" data-id="'+id+'">−</button>'+
      '<input class="ed-hpin" type="number" inputmode="numeric" data-act="hpi" data-id="'+id+'" value="'+effHp(row)+'">'+
      '<span class="ed-max">/ '+row.hp.m+'</span>'+
      '<button class="ed-step" data-act="hpu" data-id="'+id+'">+</button>'+
      (mode==="suggest"?'<button class="ed-send" data-act="send" data-id="'+id+'"'+(pending[id]?"":" disabled")+'>Suggest</button>':"")+
      '</div>';}
    out+='<div class="ed-conds">';
    ec.forEach(function(c){out+='<span class="ed-cond">'+esc(c)+'<button data-act="cdel" data-id="'+id+'" data-c="'+esc(c)+'">×</button></span>';});
    out+='<button class="ed-addc" data-act="caddtog" data-id="'+id+'">+ condition</button></div>';
    if(condMenuFor===id)out+='<div class="cmenu">'+CONDITIONS.map(function(c){return '<button class="'+(ec.indexOf(c)>=0?"on":"")+'" data-act="ctog" data-id="'+id+'" data-c="'+esc(c)+'">'+esc(c)+'</button>';}).join("")+'</div>';
    if(flashes[id])out+='<div class="ed-flash">'+esc(flashes[id])+'</div>';
    return out+'</div>';
  }

  function render(){
    if(!snap)return;
    statusEl.style.display="";
    roundEl.textContent="Round "+(snap.round||1);
    editbarEl.innerHTML=editbarHTML();
    var order=snap.order||[];
    if(!order.length){listEl.innerHTML='<div class="empty">Waiting for the fight to begin…</div>';return;}
    var curName=null;order.forEach(function(r){if(r.cur)curName=r.n;});
    listEl.innerHTML=order.map(rowHTML).join("");
    if(curName!==prevCurName){prevCurName=curName;var c=listEl.querySelector("li.cur");if(c)c.classList.add("pulse");}
    var t=snap.updated?new Date(snap.updated):new Date();
    statusEl.textContent="Updated "+t.toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});
  }
  // Skip the periodic re-render while a player is typing into an HP field or the claim name (it would
  // clobber their input). The next poll after they blur picks the fresh snapshot back up.
  function renderUnlessTyping(){var ae=document.activeElement;
    if(ae&&(ae.classList&&ae.classList.contains("ed-hpin")||ae.id==="claimInput")){statusEl.textContent="Editing…";return;}render();}

  function setHp(id,val){var row=rowById(id);if(!row||!row.hp)return;val=Math.max(0,Math.min(row.hp.m,Math.round(val)||0));
    pending[id]=pending[id]||{};pending[id].hp=val;pending[id].ts=Date.now();
    if(mode!=="suggest")scheduleWrite(id);render();}
  function toggleCond(id,name){var row=rowById(id);if(!row)return;var cur=effConds(row),i=cur.indexOf(name);
    if(i>=0)cur.splice(i,1);else cur.push(name);
    pending[id]=pending[id]||{};pending[id].conds=cur;pending[id].ts=Date.now();
    if(mode!=="suggest")scheduleWrite(id);render();}
  function sendSuggestion(id){if(!pending[id])return;doWrite(id);delete pending[id];render();}

  function scheduleWrite(id){if(writeTimers[id])clearTimeout(writeTimers[id]);writeTimers[id]=setTimeout(function(){doWrite(id);},500);}
  function doWrite(id){
    var p=pending[id];if(!p||!wbin||!wkey)return;
    var row=rowById(id),payload={ts:Date.now(),suggest:mode==="suggest",by:pname||(row?row.n:"")};
    if(p.hp!=null)payload.hp=p.hp;if(p.conds!=null)payload.conds=p.conds;
    fetch(BASE+"/b/"+wbin+"/latest?t="+Date.now(),{cache:"no-store"})
      .then(function(r){return r.ok?r.json():{record:{v:1,edits:{}}};})
      .then(function(d){var rec=(d&&d.record)?d.record:{v:1,edits:{}};if(!rec.edits)rec.edits={};rec.edits[id]=payload;
        return fetch(BASE+"/b/"+wbin,{method:"PUT",headers:{"Content-Type":"application/json","X-Access-Key":wkey},body:JSON.stringify(rec)});})
      .then(function(r){if(!r.ok)throw 0;flashRow(id,mode==="suggest"?"Suggestion sent":"Saved ✓");})
      .catch(function(){flashRow(id,"Couldn’t save — retry");});}

  listEl.addEventListener("click",function(ev){var b=ev.target.closest("[data-act]");if(!b)return;
    var id=b.getAttribute("data-id"),act=b.getAttribute("data-act"),row=rowById(id);
    if(act==="hpd")setHp(id,(effHp(row)||0)-1);
    else if(act==="hpu")setHp(id,(effHp(row)||0)+1);
    else if(act==="cdel"||act==="ctog")toggleCond(id,b.getAttribute("data-c"));
    else if(act==="caddtog"){condMenuFor=(condMenuFor===id)?null:id;render();}
    else if(act==="send")sendSuggestion(id);});
  listEl.addEventListener("change",function(ev){var inp=ev.target.closest('[data-act="hpi"]');if(inp)setHp(inp.getAttribute("data-id"),Number(inp.value));});
  editbarEl.addEventListener("click",function(ev){var b=ev.target.closest("[data-act]");if(!b)return;var act=b.getAttribute("data-act");
    if(act==="join"){var inp=document.getElementById("claimInput"),nm=(inp.value||"").trim().toLowerCase();if(!nm)return;var match=null;
      (snap.order||[]).forEach(function(r){if(r.pc&&r.id&&r.n.toLowerCase()===nm)match=r;});
      if(!match)(snap.order||[]).forEach(function(r){if(!match&&r.pc&&r.id&&r.n.toLowerCase().indexOf(nm)>=0)match=r;});
      if(match){claimId=match.id;pname=match.n;try{localStorage.setItem("mf_claim:"+wbin,claimId);}catch(e){}render();}
      else{var er=editbarEl.querySelector(".claim-err");if(er)er.textContent="No character by that name in this fight.";}}
    else if(act==="unclaim"){claimId=null;try{localStorage.removeItem("mf_claim:"+wbin);}catch(e){}render();}});

  function ingest(rec){
    snap=rec;mode=rec.edit||"off";wbin=rec.wbin||null;wkey=rec.wkey||null;
    if(wbin&&claimId==null){try{claimId=localStorage.getItem("mf_claim:"+wbin);}catch(e){}}
    if(!wbin){claimId=null;}
    reconcilePending();renderUnlessTyping();
  }
  function poll(){
    if(!binId){showMsg("<b>No share code</b>Open the link your DM gave you — it should end with <code>?b=…</code>.","err");return;}
    fetch(BASE+"/b/"+encodeURIComponent(binId)+"/latest?t="+Date.now(),{cache:"no-store"})
      .then(function(r){if(r.status===404){throw {ended:true};}if(!r.ok)throw new Error("http "+r.status);return r.json();})
      .then(function(d){failCount=0;ingest(d&&d.record?d.record:d);})
      .catch(function(err){if(err&&err.ended){showMsg("<b>Sharing ended</b>Your DM stopped sharing this fight.","err");return;}
        failCount++;if(failCount>=3&&!prevCurName)showMsg("<b>Can’t reach the fight</b>Check your connection — retrying…","err");
        else statusEl.textContent="Reconnecting…";});
  }

  if(!binId){poll();}
  else{poll();setInterval(poll,5000);
    document.addEventListener("visibilitychange",function(){if(!document.hidden)poll();});}
})();
</script>
</body>
</html>
